################################################################################
# Max-performance (practical) repo config
################################################################################

model = "gpt-5.3-codex"
review_model = "gpt-5.3-codex"

# FIX: on-failure is deprecated → use on-request (interactive) or never (non-interactive)
approval_policy = "on-request"
sandbox_mode = "workspace-write"

model_reasoning_effort = "xhigh"
model_reasoning_summary = "detailed"
model_verbosity = "high"

hide_agent_reasoning = true
notify = ["bash", "-lc", "afplay /System/Library/Sounds/Ping.aiff"]

# Web search mode
web_search = "live"   # "cached" (default) / "live" / "disabled"

[features]
unified_exec = true
shell_snapshot = true
collaboration_modes = true

[sandbox_workspace_write]
network_access = true

[agents]
max_threads = 4
max_depth = 1

[agents.explorer]
description = "Read-only codebase explorer for gathering evidence before the review fix pass edits files."
config_file = "agents/explorer.toml"

[agents.reviewer]
description = "Read-only reviewer focused on correctness, security, regressions, and missing tests."
config_file = "agents/reviewer.toml"
